{% extends "base.html" %}
{% block title %}Login — TrainMate{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">⚡ TrainMate</div>
    <h2>Welcome Back</h2>
    <p class="auth-sub">Log in to continue your journey 💪</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    <p class="auth-hint">Admin demo: admin@trainmate.com / admin123</p>
  </div>
</div>
{% endblock %}
